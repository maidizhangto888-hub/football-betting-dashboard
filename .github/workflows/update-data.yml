name: Update Football Predictions

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # ← THIS FIXES THE 403 ERROR

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and predictions
        run: python backend/scrape_and_predict.py

      - name: Commit updated predictions (if changed)
        run: |
         git config user.name "github-actions[bot]"
    git config user.email "github-actions[bot]@users.noreply.github.com"
    git add frontend/data/predictions.json || true  # 修正为新路径
    git pull origin main --rebase  # 拉取最新代码，解决冲突
    if git diff --cached --quiet; then
      echo "No changes to commit"
    else
      git commit -m "Update predictions and value bets [skip ci]"
      git push -f origin main  # 强制推送，彻底覆盖冲突
    fi
