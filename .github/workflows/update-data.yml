name: Update Football Predictions

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # ← THIS FIXES THE 403 ERROR

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and predictions
        run: python backend/scrape_and_predict.py

      - name: Commit updated predictions (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/predictions.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update predictions and value bets [skip ci]"
            git push
          fi
