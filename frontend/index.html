<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football xG Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold mb-2">📊 Football xG Analytics Dashboard</h1>
    <p class="text-emerald-400 mb-8">Click any match for detailed preview • Data auto-updates every 1 hours</p>

    <div id="summary" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8"></div>
    <div id="matches" class="space-y-6"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
    <div class="bg-gray-900 rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-auto">
      <div class="p-6 border-b border-gray-700 flex justify-between sticky top-0 bg-gray-900">
        <div id="modal-header" class="text-2xl font-bold"></div>
        <button onclick="closeModal()" class="text-4xl leading-none text-gray-400 hover:text-white">×</button>
      </div>
      <div class="p-8" id="modal-content"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
